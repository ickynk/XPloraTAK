name: Xplora → MQTT / TAK Bridge
version: "1.4.1"
slug: xplora2tak
description: >-
  Pulls watch locations from the Xplora cloud API and publishes them as
  Home Assistant device_tracker entities via MQTT, and/or directly to a
  TAK server as Cursor-on-Target (CoT) events.
url: https://github.com/ickynk/XPloraTAK
arch:
  - aarch64
  - amd64
  - armv7
init: false
hassio_api: true
services:
  - mqtt:want
map:
  - ssl:ro
  - share:ro
options:
  auth:
    email: ""
    country_code: ""
    phone_number: ""
    password: ""
  user_lang: en-US
  timezone: UTC
  poll_interval: 300
  watch_ids: []
  api:
    endpoint: ""
    key: ""
    secret: ""
  mqtt:
    enabled: true
    host: ""
    port: 1883
    username: ""
    password: ""
  tak:
    enabled: false
    host: ""
    port: 8087
    protocol: tcp
    cot_type: a-f-G-U-C
    stale_seconds: 900
    callsign_prefix: ""
    contact_presence: true
    team_color: Cyan
    team_role: Team Member
    tls_ca_file: ""
    tls_cert_file: ""
    tls_key_file: ""
    tls_p12_file: ""
    tls_p12_password: ""
    tls_verify: true
    tls_check_hostname: false
  log_level: info
# Every key is optional on purpose: the app applies its own defaults, and
# optional keys mean a schema addition in a future version can never
# invalidate previously saved options (which would force users to re-enter
# their configuration after an update).
schema:
  auth:
    email: "str?"
    country_code: "str?"
    phone_number: "str?"
    password: "password?"
  user_lang: "str?"
  timezone: "str?"
  poll_interval: "int(120,86400)?"
  watch_ids:
    - "str?"
  api:
    endpoint: "str?"
    key: "str?"
    secret: "password?"
  mqtt:
    enabled: "bool?"
    host: "str?"
    port: "port?"
    username: "str?"
    password: "password?"
  tak:
    enabled: "bool?"
    host: "str?"
    port: "port?"
    protocol: "list(tcp|tls|udp)?"
    cot_type: "str?"
    stale_seconds: "int(60,86400)?"
    callsign_prefix: "str?"
    contact_presence: "bool?"
    team_color: "str?"
    team_role: "str?"
    tls_ca_file: "str?"
    tls_cert_file: "str?"
    tls_key_file: "str?"
    tls_p12_file: "str?"
    tls_p12_password: "password?"
    tls_verify: "bool?"
    tls_check_hostname: "bool?"
  log_level: "list(debug|info|warning|error)?"
